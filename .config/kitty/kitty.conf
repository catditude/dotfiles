# Font
font_family      JetBrainsMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

cursor_blink_interval 0.5

# BEGIN_KITTY_THEME
# Mellow
include current-theme.conf
# END_KITTY_THEME

allow_remote_control yes

# Bell
enable_audio_bell no
window_alert_on_bell yes

# Forward Ctrl+Tab / Ctrl+Shift+Tab / Ctrl+` to tmux as user-keys
# (overrides kitty's default tab navigation; use Ctrl+Shift+Right/Left for kitty tabs)
map ctrl+tab send_text all \x1b[5;30012~
map ctrl+shift+tab send_text all \x1b[5;30013~
map ctrl+grave_accent send_text all \x1b[5;30014~
