# Change prefix from Ctrl-b to Ctrl-a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Prompt for window name on creation
set-window-option -g automatic-rename off
set-option -g allow-rename off
bind-key C command-prompt -p "Window name:" "new-window; rename-window '%%'"

# Prompt for changing pane title 
bind-key T command-prompt -p "Pane title:" "select-pane -T '%%'"

# New panes open in the same directory as the current pane
bind '"' split-window -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"

# Enable mouse support
set -g mouse on

# Start windows/panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Cycle windows with Ctrl-n (no prefix needed)
bind -n C-n next-window

# Switch to last window with Ctrl-p (alt-tab style, no prefix needed)
bind -n C-p last-window

# Reload config with prefix + r
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# Vi-style keys in copy mode (scroll mode)
setw -g mode-keys vi

# Faster escape time
set -sg escape-time 0

# Increase history limit
set -g history-limit 10000

# Copy to system clipboard on mouse selection or vi yank
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe "xclip -selection clipboard"
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe "xclip -selection clipboard"

# Bell — pass through to terminal for desktop notification
set -g visual-bell off
set -g bell-action any

# Allow passthrough for kitty notifications
set -g allow-passthrough on

# Smart pane switching with awareness of Vim splits
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
bind-key -n 'C-\' if-shell "$is_vim" 'send-keys C-\\'  'select-pane -l'

# Pane switching from copy mode (C-h is bound to cursor-left in copy-mode-vi by default)
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# Clear terminal (prefix + C-l) since bare C-l is used for pane switching
bind C-l send-keys C-l

# Renumber windows when one is closed
set -g renumber-windows on

# Forward focus events to programs (needed for neovim autoread)
set -g focus-events on

# Pane border styling - keep custom colors, not catppuccin
set -g pane-border-lines heavy
set -g pane-border-style fg=#444444
set -g pane-active-border-style fg=#FF6E00

# Pane status bar - shows pane index, command, title (for claude), and path
set -g pane-border-status bottom
set -g pane-border-format ' #[fg=#FF6E00]#{pane_index}#[default] #{pane_current_command}#{?#{==:#{pane_current_command},claude}, · #{pane_title},} #[fg=#878787]#{b:pane_current_path}#[default] '

# --- Catppuccin status line ---
set -g @catppuccin_flavor 'frappe'
set -g @catppuccin_window_status_style "none"

# Load catppuccin
run ~/.tmux/plugins/catppuccin/tmux/catppuccin.tmux

# Status line background matches terminal background
set -g status-style bg=#1c1c1c

# Bell monitoring enabled
set -g monitor-bell on

# Inactive windows: no background, just text (bell-aware fg/icon)
set -g window-status-format "#{?window_bell_flag,#[fg=#e05555#,bg=#1c1c1c]#[fg=#000000#,bg=#e05555#,bold] #I #W 🔔 #[fg=#e05555#,bg=#1c1c1c], #[fg=#{@thm_overlay_2}]#I #W }"

# Active window: rounded highlight with light peach background
set -g window-status-current-format "#[fg=#fab387,bg=#1c1c1c]#[fg=#1c1c1c,bg=#fab387,bold] #I #W #[fg=#fab387,bg=#1c1c1c]"

# Status line modules
set -g status-left "#{?client_prefix,#[fg=#f4b8e4#,bg=#1c1c1c]#[fg=#1c1c1c#,bg=#f4b8e4#,bold] PREFIX #[fg=#f4b8e4#,bg=#1c1c1c]#[default] ,#{?pane_in_mode,#[fg=#a6d189#,bg=#1c1c1c]#[fg=#1c1c1c#,bg=#a6d189#,bold] COPY #[fg=#a6d189#,bg=#1c1c1c]#[default] ,}}"
set -g status-left-length 20
set -g status-right-length 100
set -g status-right "#{E:@catppuccin_status_directory}#{E:@catppuccin_status_session}"

# Re-apply pane borders after catppuccin (prevent override)
set -g pane-border-style fg=#444444
set -g pane-active-border-style fg=#FF6E00
set -g mode-style "bg=#A4B8AC,fg=#1c1c1c,bold"

# --- Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'catppuccin/tmux'

# Continuum: auto-restore on tmux start
set -g @continuum-restore 'on'

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
